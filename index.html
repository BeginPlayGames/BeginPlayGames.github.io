<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анти-Кликер: Минус Вайб</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="background-container"></div>
    
    <header class="glass-panel">
        <h1>Баланс: <span id="balance">1000</span> <span class="coin-icon">💰</span></h1>
    </header>

    <main>
        <div id="click-area">
            <img src="assets/Verb.png" alt="Кликай сюда!" id="main-clicker">
        </div>
    </main>

    <!-- Lootbox Modal -->
    <div id="lootbox-modal" class="hidden">
        <div class="lootbox glass-panel">
            <h2>🎁 Кринж-Бокс! 🎁</h2>
            <p>Открой его быстрее, пока он не убежал!</p>
            <div id="lootbox-item" class="shake-animation">📦</div>
        </div>
    </div>

    <!-- Floating texts container -->
    <div id="floating-texts"></div>

    <script src="script.js"></script>
</body>
</html>
